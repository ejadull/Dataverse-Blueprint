name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore DataverseBlueprint.sln

      - name: Build
        run: dotnet build DataverseBlueprint.sln --no-restore --configuration Debug

      - name: Test
        run: dotnet test DataverseBlueprint.Tests/DataverseBlueprint.Tests.csproj --no-build --logger "console;verbosity=normal"
